<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG PDF Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 780px;
      height: 92vh;
      display: flex;
      flex-direction: column;
      background: #1a1a1a;
      border-radius: 16px;
      border: 1px solid #2a2a2a;
      overflow: hidden;
    }

    .header {
      padding: 18px 24px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #141414;
    }

    .header-icon {
      width: 36px; height: 36px;
      background: #2563eb;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .header h1 { font-size: 17px; font-weight: 600; color: #f0f0f0; }
    .header p  { font-size: 12px; color: #666; margin-top: 2px; }

    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #555;
      background: #1f1f1f;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #2a2a2a;
    }
    .status-pill .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #444;
    }
    .status-pill.active .dot { background: #22c55e; box-shadow: 0 0 5px #22c55e; }
    .status-pill.active { color: #22c55e; border-color: #1a3a25; }
    .status-pill.error .dot { background: #ef4444; }
    .status-pill.error { color: #ef4444; border-color: #3a1a1a; }

    /* Upload Zone */
    .upload-zone {
      margin: 16px 24px 0;
      border: 1.5px dashed #2a2a2a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #141414;
      position: relative;
    }
    .upload-zone:hover,
    .upload-zone.dragover { border-color: #2563eb; background: #1a1f2e; }
    .upload-zone.dragover { transform: scale(1.01); }
    .upload-zone.success { border-color: #22c55e; background: #0f1f13; border-style: solid; }
    .upload-zone.error-state { border-color: #ef4444; background: #1f0f0f; border-style: solid; }

    .upload-zone input { display: none; }
    .upload-zone label { cursor: pointer; display: block; }
    .upload-icon { font-size: 28px; margin-bottom: 8px; }
    .upload-title { font-size: 14px; font-weight: 500; color: #ccc; }
    .upload-sub { font-size: 12px; color: #555; margin-top: 4px; }

    .upload-status {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .upload-status.show { display: flex; }
    .upload-status.success { color: #22c55e; }
    .upload-status.error { color: #ef4444; }
    .upload-status.loading { color: #60a5fa; }

    .progress-bar {
      margin-top: 10px;
      height: 3px;
      background: #2a2a2a;
      border-radius: 2px;
      display: none;
      overflow: hidden;
    }
    .progress-bar.show { display: block; }
    .progress-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
      animation: indeterminate 1.5s infinite;
    }
    @keyframes indeterminate {
      0% { width: 0%; margin-left: 0; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }

    /* Chat */
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot  { align-self: flex-start; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .message.user .avatar { background: #2563eb; }
    .message.bot  .avatar { background: #2a2a2a; }

    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }
    .message.user .bubble { background: #2563eb; color: #fff; border-radius: 12px 2px 12px 12px; }
    .message.bot  .bubble { background: #242424; color: #e0e0e0; border-radius: 2px 12px 12px 12px; }
    .message.bot.error-msg .bubble { background: #2a1515; border: 1px solid #3a1a1a; color: #f87171; }
    .message.bot.warning-msg .bubble { background: #2a2010; border: 1px solid #3a2e10; color: #fbbf24; }

    .source-tag {
      font-size: 11px;
      color: #555;
      margin-top: 5px;
      padding-left: 2px;
    }

    .typing-indicator span {
      display: inline-block;
      width: 6px; height: 6px;
      background: #555;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #444;
      text-align: center;
      gap: 8px;
      padding-bottom: 40px;
    }
    .empty-state .icon { font-size: 36px; }
    .empty-state p { font-size: 13px; max-width: 260px; line-height: 1.6; }

    /* Input */
    .input-area {
      padding: 14px 24px 18px;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 10px;
      background: #141414;
    }

    .input-area input {
      flex: 1;
      background: #242424;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 11px 14px;
      color: #e5e5e5;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .input-area input:focus { border-color: #2563eb; background: #1e2330; }
    .input-area input::placeholder { color: #444; }
    .input-area input:disabled { opacity: 0.4; cursor: not-allowed; }

    .send-btn {
      background: #2563eb;
      border: none;
      border-radius: 10px;
      padding: 11px 20px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .send-btn:hover:not(:disabled) { background: #1d4ed8; }
    .send-btn:active:not(:disabled) { transform: scale(0.97); }
    .send-btn:disabled { background: #1e3a6e; cursor: not-allowed; opacity: 0.5; }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">📄</div>
    <div>
      <h1>PDF Intelligence Bot</h1>
      <p>Upload a PDF and ask anything about it</p>
    </div>
    <div class="status-pill" id="statusPill">
      <div class="dot"></div>
      <span id="statusText">No PDF loaded</span>
    </div>
  </div>

  <!-- Upload Zone -->
  <div class="upload-zone" id="uploadZone">
    <label for="pdfInput">
      <div class="upload-icon">☁️</div>
      <div class="upload-title">Click to upload or drag & drop a PDF</div>
      <div class="upload-sub">Only .pdf files are supported</div>
    </label>
    <input type="file" id="pdfInput" accept=".pdf" onchange="handleFileSelect(this.files[0])"/>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill"></div>
    </div>

    <div class="upload-status" id="uploadStatus"></div>
  </div>

  <!-- Chat Messages -->
  <div class="chat-box" id="chatBox">
    <div class="empty-state" id="emptyState">
      <div class="icon">💬</div>
      <p>Upload a PDF above to start asking questions about its content</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <input
      type="text"
      id="questionInput"
      placeholder="Upload a PDF first..."
      disabled
      onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendQuestion(); }"
    />
    <button class="send-btn" id="sendBtn" onclick="sendQuestion()" disabled>
      <span>Send</span>
      <span>➤</span>
    </button>
  </div>

</div>

<script>
  const API = "http://127.0.0.1:8000";
  const sessionId = "session_" + Math.random().toString(36).substr(2, 9);
  let pdfReady = false;

  // ── Drag & Drop ──────────────────────────────────────────
  const zone = document.getElementById("uploadZone");

  zone.addEventListener("dragover", e => {
    e.preventDefault();
    zone.classList.add("dragover");
  });

  zone.addEventListener("dragleave", e => {
    e.preventDefault();
    zone.classList.remove("dragover");
  });

  zone.addEventListener("drop", e => {
    e.preventDefault();
    zone.classList.remove("dragover");
    const file = e.dataTransfer.files[0];
    if (file) handleFileSelect(file);
  });

  // ── File Handler ─────────────────────────────────────────
  function handleFileSelect(file) {
    if (!file) return;

    if (!file.name.endsWith(".pdf")) {
      setUploadStatus("error", "❌ Only PDF files are supported.");
      zone.classList.add("error-state");
      zone.classList.remove("success");
      return;
    }

    uploadPDF(file);
  }

  async function uploadPDF(file) {
    // Reset state
    zone.classList.remove("success", "error-state");
    setUploadStatus("loading", `⏳ Processing "${file.name}"...`);
    document.getElementById("progressBar").classList.add("show");
    setStatus("loading", "Processing...");

    const formData = new FormData();
    formData.append("file", file);

    try {
      const res = await fetch(`${API}/upload-pdf/?session_id=${sessionId}`, {
        method: "POST",
        body: formData
      });

      const data = await res.json();
      document.getElementById("progressBar").classList.remove("show");

      if (res.ok) {
        // ✅ Success
        zone.classList.add("success");
        setUploadStatus("success", `✅ "${file.name}" uploaded successfully — ${file.name.replace(".pdf","")} is ready!`);
        setStatus("active", "PDF Ready");

        document.getElementById("questionInput").disabled = false;
        document.getElementById("questionInput").placeholder = `Ask anything about "${file.name}"...`;
        document.getElementById("sendBtn").disabled = false;
        pdfReady = true;

        document.getElementById("emptyState")?.remove();
        addBotMessage(`📄 <strong>${file.name}</strong> has been loaded successfully! I've read all its content. Go ahead and ask me anything about it.`);

      } else {
        // ❌ Backend returned error (e.g. scanned PDF)
        const errMsg = data.detail || "Upload failed.";
        zone.classList.add("error-state");

        if (errMsg.includes("image-based") || errMsg.includes("empty")) {
          setUploadStatus("error", "⚠️ This PDF appears to be scanned or image-based. No readable text was found.");
          setStatus("error", "Unsupported PDF");
          document.getElementById("emptyState") || addEmptyState();
          addWarningMessage("⚠️ <strong>Scanned PDF detected.</strong> This PDF contains images instead of text, so I can't read it directly. Please try a different PDF that has selectable/copyable text.");
        } else {
          setUploadStatus("error", `❌ ${errMsg}`);
          setStatus("error", "Upload Failed");
        }
      }

    } catch (e) {
      document.getElementById("progressBar").classList.remove("show");
      zone.classList.add("error-state");
      setUploadStatus("error", "❌ Cannot connect to backend. Make sure it's running on port 8000.");
      setStatus("error", "Disconnected");
    }
  }

  // ── Ask Question ─────────────────────────────────────────
  async function sendQuestion() {
    const input = document.getElementById("questionInput");
    const question = input.value.trim();
    if (!question || !pdfReady) return;

    input.value = "";
    document.getElementById("sendBtn").disabled = true;
    input.disabled = true;

    addUserMessage(question);
    const typingId = addTypingIndicator();

    try {
      const res = await fetch(`${API}/ask/`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, question })
      });

      const data = await res.json();
      removeTypingIndicator(typingId);

      if (res.ok) {
        addBotMessage(data.answer, data.source_pages);
      } else {
        addErrorMessage("❌ " + (data.detail || "Something went wrong. Please try again."));
      }

    } catch (e) {
      removeTypingIndicator(typingId);
      addErrorMessage("❌ Cannot reach backend. Make sure uvicorn is running on port 8000.");
    }

    document.getElementById("sendBtn").disabled = false;
    input.disabled = false;
    input.focus();
  }

  // ── Message Helpers ───────────────────────────────────────
  function addUserMessage(text) {
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML += `
      <div class="message user">
        <div class="avatar">👤</div>
        <div class="bubble">${escapeHtml(text)}</div>
      </div>`;
    scrollToBottom();
  }

  function addBotMessage(html, sourcePages = []) {
    const chatBox = document.getElementById("chatBox");
    const sourceHtml = sourcePages && sourcePages.length
      ? `<div class="source-tag">📄 Source pages: ${sourcePages.join(", ")}</div>`
      : "";
    chatBox.innerHTML += `
      <div class="message bot">
        <div class="avatar">🤖</div>
        <div>
          <div class="bubble">${html}</div>
          ${sourceHtml}
        </div>
      </div>`;
    scrollToBottom();
  }

  function addWarningMessage(html) {
    const chatBox = document.getElementById("chatBox");
    document.getElementById("emptyState")?.remove();
    chatBox.innerHTML += `
      <div class="message bot warning-msg">
        <div class="avatar">⚠️</div>
        <div class="bubble">${html}</div>
      </div>`;
    scrollToBottom();
  }

  function addErrorMessage(html) {
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML += `
      <div class="message bot error-msg">
        <div class="avatar">❌</div>
        <div class="bubble">${html}</div>
      </div>`;
    scrollToBottom();
  }

  function addTypingIndicator() {
    const id = "typing_" + Date.now();
    document.getElementById("chatBox").innerHTML += `
      <div class="message bot" id="${id}">
        <div class="avatar">🤖</div>
        <div class="bubble">
          <div class="typing-indicator"><span></span><span></span><span></span></div>
        </div>
      </div>`;
    scrollToBottom();
    return id;
  }

  function removeTypingIndicator(id) {
    document.getElementById(id)?.remove();
  }

  // ── UI Helpers ────────────────────────────────────────────
  function setUploadStatus(type, msg) {
    const el = document.getElementById("uploadStatus");
    el.className = `upload-status show ${type}`;
    el.innerHTML = msg;
  }

  function setStatus(type, text) {
    const pill = document.getElementById("statusPill");
    const span = document.getElementById("statusText");
    pill.className = `status-pill ${type}`;
    span.textContent = text;
  }

  function scrollToBottom() {
    const chatBox = document.getElementById("chatBox");
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/\n/g,"<br>");
  }
</script>

</body>
</html>
